<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIK'S Archive | Solution Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; margin: 0; padding: 0; }
        .light { background-color: #f3f4f6; color: #111; }
        .dark { background-color: #0a0a0a; color: #eee; }

        .boxed-container { 
            max-width: 1200px; margin: 0 auto; min-height: 100vh;
            display: flex; flex-direction: column; 
        }
        .dark .boxed-container { background-color: #000; border-left: 1px solid #111; border-right: 1px solid #111; }
        .light .boxed-container { background-color: #fff; box-shadow: 0 0 50px rgba(0,0,0,0.02); }

        .hidden { display: none; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .premium-card { border-radius: 20px; transition: 0.3s; border: 1px solid rgba(128,128,128,0.1); }
        .dark .premium-card { background: #0a0a0a; }
        .light .premium-card { background: #fafafa; }
    </style>
</head>
<body class="light" id="bodyTag">

    <div class="boxed-container">
        <nav class="flex items-center justify-between px-8 py-6 border-b border-gray-100 dark:border-zinc-900 sticky top-0 bg-inherit z-50">
            <div class="text-xl font-black tracking-tighter uppercase" id="logoText">ATIK.Archive</div>
            
            <div class="flex items-center gap-6">
                <div class="hidden md:flex space-x-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                    <button onclick="navigate('home')">Home</button>
                    <button onclick="navigate('blog')">Archive</button>
                    <button onclick="navigate('admin')">Admin</button>
                </div>
                <button onclick="toggleMode()" class="text-lg p-2"><i id="modeIcon" class="fas fa-moon"></i></button>
            </div>
        </nav>

        <main class="px-8 md:px-16 flex-grow">
            <section id="home" class="active py-16 flex flex-col md:flex-row items-center gap-12">
                <div class="flex-1 space-y-6">
                    <h1 class="text-5xl md:text-7xl font-extrabold tracking-tighter leading-none" id="heroTitle">Architecting Scale.</h1>
                    <p class="text-gray-500 text-lg max-w-md">Software Architect documenting technical solutions and network infrastructures.</p>
                    <button onclick="navigate('blog')" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold text-sm shadow-lg shadow-blue-200">View Archive</button>
                </div>
                <div class="flex-1">
                    <img id="userImg" src="https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?q=80&w=800" class="w-full max-w-sm rounded-[40px] shadow-2xl grayscale hover:grayscale-0 transition duration-700 mx-auto">
                </div>
            </section>

            <section id="blog" class="hidden py-16">
                <h2 class="text-3xl font-black mb-10 italic">Latest Insights.</h2>
                <div id="blog-container" class="grid gap-8">
                    </div>
            </section>

            <section id="admin" class="hidden py-20 text-center">
                <div class="max-w-xs mx-auto p-8 rounded-3xl border dark:border-zinc-800">
                    <h3 class="font-bold mb-4 uppercase text-xs tracking-widest">Access Key</h3>
                    <input type="password" id="passInput" class="w-full p-3 rounded-xl mb-4 text-center bg-gray-50 dark:bg-zinc-900 outline-none border dark:border-zinc-700">
                    <button onclick="auth()" class="w-full bg-black dark:bg-white dark:text-black text-white py-3 rounded-xl font-bold">Unlock</button>
                </div>
            </section>

            <section id="dashboard" class="hidden py-10">
                <div class="grid md:grid-cols-2 gap-10">
                    <div class="space-y-4">
                        <h2 class="font-bold uppercase text-xs text-blue-600">New Post</h2>
                        <input type="text" id="postTitle" placeholder="Title" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none">
                        <input type="text" id="postImg" placeholder="Photo URL (Optional)" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none">
                        <textarea id="postContent" rows="6" placeholder="Content (HTML ok)" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none"></textarea>
                        <button onclick="publish()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Publish Insight</button>
                    </div>
                    <div class="space-y-4">
                        <h2 class="font-bold uppercase text-xs text-blue-600">Site Identity</h2>
                        <input type="text" id="setLogo" placeholder="Site Name (ATIK.Archive)" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none">
                        <input type="text" id="setHero" placeholder="Hero Title" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none">
                        <input type="text" id="setImg" placeholder="Personal Photo URL" class="w-full p-4 rounded-xl bg-gray-50 dark:bg-zinc-900 outline-none">
                        <button onclick="updateIdentity()" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold">Update Brand</button>
                    </div>
                </div>
            </section>
        </main>

        <footer class="p-8 text-center text-[10px] font-bold text-gray-400 uppercase tracking-widest border-t dark:border-zinc-900">
            &copy; 2026 ARCHITECT.ATIK — FULL STACK ARCHIVE
        </footer>
    </div>

    <script>
        const API_URL = "https://atik-backend.your-username.workers.dev/api/posts"; // আপনার Worker URL দিন

        // Theme Toggle
        function toggleMode() {
            const body = document.getElementById('bodyTag');
            const icon = document.getElementById('modeIcon');
            if(body.classList.contains('light')) {
                body.classList.replace('light', 'dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                body.classList.replace('dark', 'light');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        }

        // Navigation
        function navigate(id) {
            document.querySelectorAll('section').forEach(s => s.classList.replace('active', 'hidden'));
            document.getElementById(id).classList.replace('hidden', 'active');
            if(id === 'blog') loadPosts();
            window.scrollTo(0,0);
        }

        // Auth
        function auth() {
            if(document.getElementById('passInput').value === "12345") navigate('dashboard');
            else alert("Wrong Key");
        }

        // Load Posts
        async function loadPosts() {
            const res = await fetch(API_URL);
            const posts = await res.json();
            const container = document.getElementById('blog-container');
            container.innerHTML = posts.map(p => `
                <div class="premium-card p-8 group relative">
                    <div class="flex flex-col md:flex-row gap-6">
                        ${p.image ? `<img src="${p.image}" class="w-full md:w-48 h-32 object-cover rounded-xl shadow-lg">` : ''}
                        <div class="flex-1">
                            <h3 class="text-2xl font-bold mb-2 group-hover:text-blue-600 transition">${p.title}</h3>
                            <p class="text-gray-500 leading-relaxed">${p.content}</p>
                        </div>
                    </div>
                    <div class="mt-4 flex gap-4 text-[10px] font-bold uppercase text-red-500">
                        <button onclick="deletePost(${p.id})"><i class="fas fa-trash mr-1"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Create Post
        async function publish() {
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const image = document.getElementById('postImg').value;

            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, image })
            });

            if(res.ok) { alert("Insight Added!"); navigate('blog'); }
        }

        // Delete Post
        async function deletePost(id) {
            if(!confirm("Are you sure?")) return;
            const res = await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
            if(res.ok) loadPosts();
        }

        // Update Identity
        function updateIdentity() {
            const logo = document.getElementById('setLogo').value;
            const hero = document.getElementById('setHero').value;
            const img = document.getElementById('setImg').value;

            if(logo) document.getElementById('logoText').innerText = logo;
            if(hero) document.getElementById('heroTitle').innerText = hero;
            if(img) document.getElementById('userImg').src = img;
            
            alert("Identity Updated (Preview Mode)");
        }
        
        window.onload = loadPosts;
    </script>
</body>
</html>
