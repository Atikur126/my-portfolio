<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATIK'S ARCHIVE | Solution Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; margin: 0; padding: 0; }
        .light { background-color: #f8f9fa; color: #111; }
        .dark { background-color: #000000; color: #ffffff; }

        .boxed-container { max-width: 1300px; margin: 0 auto; background: inherit; min-height: 100vh; }
        .hidden { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Color Fix for Dark Mode */
        .dark .text-muted { color: #9ca3af !important; }
        .dark .contact-box { background: #0a0a0a; border: 1px solid #111; color: #fff; }
        .dark .contact-box p { color: #fff !important; }

        /* Rich Text Toolbar */
        .toolbar button { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; margin-right: 5px; font-weight: bold; background: #fff; color: #000; }
        #editor { min-height: 200px; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; overflow-y: auto; }
        .dark #editor { background: #0a0a0a; border-color: #333; color: #fff; }
    </style>
</head>
<body class="light" id="appBody">

    <div class="boxed-container border-x dark:border-zinc-900">
        <nav class="flex items-center justify-between px-10 py-8 sticky top-0 bg-inherit z-50 border-b dark:border-zinc-900">
            <div class="text-2xl font-black italic cursor-pointer uppercase tracking-tighter" onclick="navigate('home')" id="siteLogo">ATIK.Archive</div>
            <div class="hidden md:flex space-x-8 text-[11px] font-bold uppercase tracking-widest text-gray-400">
                <button onclick="navigate('home')" class="hover:text-blue-500">Home</button>
                <button onclick="navigate('blog')" class="hover:text-blue-500">Archive</button>
                <button onclick="navigate('gallery')" class="hover:text-blue-500">Gallery</button>
                <button onclick="navigate('admin')" class="text-blue-600">Admin</button>
            </div>
            <button onclick="toggleTheme()" class="p-2"><i id="themeIcon" class="fas fa-moon"></i></button>
        </nav>

        <main class="px-10 py-12">
            <section id="home" class="active space-y-24">
                <div class="flex flex-col md:flex-row items-center gap-16">
                    <div class="flex-1 space-y-8">
                        <h1 class="text-6xl md:text-8xl font-black tracking-tighter leading-none" id="mainTitle">Architecting Scale.</h1>
                        <p class="text-muted text-xl max-w-lg">Solution Architect & Developer. Managing network infrastructures and building automated software systems.</p>
                        <button onclick="navigate('blog')" class="bg-blue-600 text-white px-10 py-4 rounded-2xl font-bold">READ ARCHIVE</button>
                    </div>
                    <img id="mainImg" class="w-full max-w-sm rounded-[40px] shadow-2xl grayscale border-8 border-white dark:border-zinc-800">
                </div>

                <div>
                    <h2 class="text-2xl font-black mb-8 italic uppercase tracking-tighter">Featured Insights</h2>
                    <div id="home-posts" class="grid md:grid-cols-3 gap-6"></div>
                    <div class="text-center mt-12"><button onclick="navigate('blog')" class="text-blue-600 font-bold uppercase text-xs tracking-widest">Show More Archive +</button></div>
                </div>
            </section>

            <section id="blog" class="hidden py-10">
                <h2 class="text-4xl font-black mb-12 italic underline decoration-blue-600 underline-offset-8">The Technical Archive</h2>
                <div id="posts-list" class="grid md:grid-cols-3 gap-8"></div>
            </section>

            <section id="gallery" class="hidden py-10">
                <h2 class="text-4xl font-black mb-12 italic">Visual Gallery</h2>
                <div class="grid md:grid-cols-4 gap-4">
                    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b" class="rounded-xl aspect-square object-cover">
                    <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc51" class="rounded-xl aspect-square object-cover">
                    <div class="bg-zinc-800 rounded-xl flex items-center justify-center text-gray-500">Video Placeholder</div>
                </div>
            </section>

            <section id="contact" class="hidden py-20 text-center">
                <h2 class="text-5xl font-black italic mb-10">Get In Touch.</h2>
                <div class="contact-box max-w-2xl mx-auto p-16 rounded-[40px] bg-zinc-50 shadow-xl space-y-6">
                    <p class="text-3xl font-black text-blue-600">atik@atikarchive.com</p>
                    <p class="font-bold uppercase text-xs tracking-[0.5em]">DHAKA, BANGLADESH</p>
                </div>
            </section>

            <section id="admin" class="hidden py-12">
                <div id="login-sec" class="max-w-sm mx-auto p-10 card border rounded-3xl text-center dark:bg-zinc-950">
                    <input type="password" id="authKey" class="w-full p-4 mb-4 rounded-xl dark:bg-zinc-900 border outline-none text-center" placeholder="Security Key">
                    <button onclick="auth()" class="bg-black text-white dark:bg-white dark:text-black px-10 py-3 rounded-xl font-bold w-full">Unlock Panel</button>
                </div>

                <div id="dash-sec" class="hidden space-y-12">
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="space-y-4">
                            <h3 class="font-bold uppercase text-blue-600">New Insight</h3>
                            <input type="text" id="pTitle" placeholder="Title" class="w-full p-4 rounded-xl border dark:bg-zinc-900">
                            <input type="text" id="pImg" placeholder="Image URL" class="w-full p-4 rounded-xl border dark:bg-zinc-900">
                            <div class="toolbar flex flex-wrap gap-2">
                                <button onclick="execCmd('bold')">B</button>
                                <button onclick="execCmd('italic')">I</button>
                                <button onclick="execCmd('underline')">U</button>
                                <button onclick="execCmd('formatBlock', 'h3')">H3</button>
                                <button onclick="execCmd('insertUnorderedList')">UL</button>
                            </div>
                            <div id="editor" contenteditable="true" class="bg-white text-black"></div>
                            <button onclick="createPost()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Publish Insight</button>
                        </div>
                        <div class="space-y-4">
                            <h3 class="font-bold uppercase text-gray-400">Settings</h3>
                            <input type="text" id="upLogo" placeholder="Logo" class="w-full p-4 border dark:bg-zinc-900 rounded-xl">
                            <input type="text" id="upHero" placeholder="Hero Heading" class="w-full p-4 border dark:bg-zinc-900 rounded-xl">
                            <input type="text" id="upImg" placeholder="Profile Photo URL" class="w-full p-4 border dark:bg-zinc-900 rounded-xl">
                            <input type="text" id="upPass" placeholder="Change Password" class="w-full p-4 border dark:bg-zinc-900 rounded-xl">
                            <button onclick="saveIdentity()" class="w-full bg-zinc-900 text-white py-4 rounded-xl font-bold uppercase text-xs">Update Branding</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API = "https://atik-backend.atikurr692.workers.dev"; // আপনার Worker URL

        function toggleTheme() {
            const b = document.getElementById('appBody');
            const i = document.getElementById('themeIcon');
            b.classList.toggle('light'); b.classList.toggle('dark');
            i.classList.toggle('fa-moon'); i.classList.toggle('fa-sun');
        }

        function navigate(id) {
            document.querySelectorAll('main > section').forEach(s => s.classList.replace('active', 'hidden'));
            document.getElementById(id).classList.replace('hidden', 'active');
            if(id === 'blog' || id === 'home') loadPosts();
            window.scrollTo(0,0);
        }

        // Rich Text Function
        function execCmd(cmd, val = null) { document.execCommand(cmd, false, val); }

        async function auth() {
            const res = await fetch(`${API}/api/config`);
            const config = await res.json();
            if(document.getElementById('authKey').value === config.password) {
                document.getElementById('login-sec').classList.add('hidden');
                document.getElementById('dash-sec').classList.remove('hidden');
                // Auto fill
                document.getElementById('upLogo').value = config.logo;
                document.getElementById('upHero').value = config.hero;
                document.getElementById('upImg').value = config.photo;
                document.getElementById('upPass').value = config.password;
            } else alert("Wrong Key!");
        }

        async function loadIdentity() {
            const res = await fetch(`${API}/api/config`);
            const c = await res.json();
            document.getElementById('siteLogo').innerText = c.logo;
            document.getElementById('mainTitle').innerText = c.hero;
            document.getElementById('mainImg').src = c.photo;
        }

        async function saveIdentity() {
            const data = { logo: document.getElementById('upLogo').value, hero: document.getElementById('upHero').value, photo: document.getElementById('upImg').value, password: document.getElementById('upPass').value };
            await fetch(`${API}/api/config`, { method: 'POST', body: JSON.stringify(data) });
            alert("Updated!"); location.reload();
        }

        async function loadPosts() {
            const res = await fetch(`${API}/api/posts`);
            const posts = await res.json();
            const homeList = document.getElementById('home-posts');
            const blogList = document.getElementById('posts-list');
            
            const html = posts.map(p => `
                <div class="card p-6 border rounded-3xl dark:border-zinc-900 group">
                    ${p.image ? `<img src="${p.image}" class="w-full h-40 object-cover rounded-2xl mb-4">` : ''}
                    <h3 class="text-xl font-bold mb-2 group-hover:text-blue-600 transition">${p.title}</h3>
                    <div class="text-muted text-sm line-clamp-3">${p.content}</div>
                    <button onclick="deletePost(${p.id})" class="text-red-500 text-[9px] font-bold mt-4 uppercase">Delete</button>
                </div>
            `).join('');
            
            if(homeList) homeList.innerHTML = html.slice(0, 3); // Home এ ৩ টা
            if(blogList) blogList.innerHTML = html; // ব্লগ এ সব
        }

        async function createPost() {
            const data = { title: document.getElementById('pTitle').value, image: document.getElementById('pImg').value, content: document.getElementById('editor').innerHTML };
            await fetch(`${API}/api/posts`, { method: 'POST', body: JSON.stringify(data) });
            alert("Published!"); navigate('blog');
        }

        async function deletePost(id) {
            if(!confirm("Delete?")) return;
            await fetch(`${API}/api/posts/${id}`, { method: 'DELETE' });
            loadPosts();
        }

        window.onload = loadIdentity;
    </script>
</body>
</html>
